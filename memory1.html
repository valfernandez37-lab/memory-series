<!DOCTYPE html>
<html lang="en">
  
  <head>
    <meta charset="utf-8" />
    <title>memory series</title>
    <script src="p5.js"></script>
    <link rel="stylesheet" type="text/css" href="style1.css">
  </head>
  
  
  <body>
    
    <div id="hub">
      <img class="logo" src="assets/fondos-01.png" alt="logo">
      <p class="titulo">{ A HOME IS MADE OUT OF MEMORIES }</p>
    <img class="objeto" src="assets/regreso-foto.png" alt="memory 1" onclick="abrirSketch()">   
      
      <a href="memory2.html"> 
      <img class="objeto2" src="assets/Memory2_Foto.png" alt="memory 2"> </a>
      <p class="descripcion"> - una carta de amor a mi país - <br>porque mi casa nunca fue un lugar, sino mi familia.</p>
      
      <a href="memory3.html">
      <img class="objeto3" src="assets/disney.png" alt="memory 3">
      </a>
      
      <a href="memory4.html">
      <img class="objeto4" src="assets/viaje.png" alt="memory 4">
      </a>
      
    </div>

    <p id="texto-sketch">presiona spacebar y clickea para<br> explorar el recuerdo.</p>

     <a href="memory2.html" id="next-btn" title="next memory">
    <img src="assets/boton-05.png" alt="next">
    </a>
      
    <a href="memory1.html" id="home-btn" title="go home">
    <img src="assets/fondos-01.png" alt="home">
    </a>
      

    
    <script src="sketch1.js"></script>
    <script>
     function abrirSketch() {
      document.getElementById('hub').style.display = 'none';
      document.getElementById('home-btn').style.display = 'block';
      document.getElementById('next-btn').style.display = 'block';
      document.getElementById('texto-sketch').style.display = 'block';
  
    setTimeout(function() {
        document.querySelector('canvas').style.display = 'block';
      }, 100);
    }

    function volverHub() {
      document.getElementById('hub').style.display = 'block';
      document.getElementById('home-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('texto-sketch').style.display = 'none';
      document.querySelector('canvas').style.display = 'none';
      document.body.style.background = '#f7f7f7';
    }
      
    if (window.location.hash === '#sketch') {
    abrirSketch();
    }
    </script>

  </body>

</html>
